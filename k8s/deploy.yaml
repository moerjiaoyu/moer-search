---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    k8s.kuboard.cn/displayName: moer-search搜索服务
    k8s.kuboard.cn/service: NodePort
    k8s.kuboard.cn/workload: moer-search-service
  labels:
    k8s.kuboard.cn/layer: svc
    k8s.kuboard.cn/name: moer-search-service
  name: moer-search-service
  namespace: moer
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      k8s.kuboard.cn/layer: svc
      k8s.kuboard.cn/name: moer-search-service
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        k8s.kuboard.cn/layer: svc
        k8s.kuboard.cn/name: moer-search-service
    spec:
      containers:
        - env:
            - name: SERVER_PORT
              value: '32759'
            - name: GRPC_SERVER_PORT
              value: '19998'
            - name: JAVA_TOOL_OPTIONS
              value: '-Xmx2048m -Xms2048m -verbose:gc -Xlog:gc:/var/log/gc.log'
            - name: ELASTICSEARCH_HOSTNAMES
              value: 'elasticsearch.index-cluster.svc.cluster.local:9200'
          image: 'localhost/moer/moer-search-service:1.0.0.20230204.4'
          imagePullPolicy: IfNotPresent
          lifecycle: {}
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /static/heartbeat
              port: 32759
              scheme: HTTP
            initialDelaySeconds: 150
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          name: moer-service-service
          readinessProbe:
            failureThreshold: 5
            httpGet:
              path: /static/heartbeat
              port: 32759
              scheme: HTTP
            initialDelaySeconds: 150
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              cpu: '2'
              memory: 4Gi
            requests:
              cpu: '1'
              memory: 2Gi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      dnsConfig: {}
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: dibase-harbor
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        seLinuxOptions: {}
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  annotations:
    k8s.kuboard.cn/displayName: MoerSearch搜索服务
    k8s.kuboard.cn/workload: moer-search-service
  labels:
    k8s.kuboard.cn/layer: svc
    k8s.kuboard.cn/name: moer-search-service
  name: moer-search-service
  namespace: moer
spec:
  ports:
    - name: http-port
      nodePort: 31607
      port: 32758
      protocol: TCP
      targetPort: 32758
    - name: grpc-port
      nodePort: 31608
      port: 19998
      protocol: TCP
      targetPort: 19998
  selector:
    k8s.kuboard.cn/layer: svc
    k8s.kuboard.cn/name: moer-search-service
  sessionAffinity: None
  type: NodePort
